kind = "mobile"
previewPath = "/"
title = "BizManager - Purchase & Sales"
version = "1.0.0"
id = "artifacts/biz-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21418

[services.development]
run = "pnpm --filter @workspace/biz-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biz-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/biz-app", "run", "serve" ]

[services.env]
PORT = "21418"
BASE_PATH = "/"
